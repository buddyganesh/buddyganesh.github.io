<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found | Buddy Ganesh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: #1a1510;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10rem;
    font-weight: 300;
    color: #c8a84b;
    opacity: 0.2;
    line-height: 1;
    margin-bottom: -30px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.8);
    margin-bottom: 16px;
  }
  p {
    font-size: 0.9rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    margin-bottom: 40px;
    line-height: 1.8;
  }
  a {
    display: inline-block;
    border: 1px solid #c8a84b;
    color: #c8a84b;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 13px 36px;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.3s;
  }
  a:hover { background: #c8a84b; color: #1a1510; }
</style>
</head>
<body>
  <div class="num">404</div>
  <h1>This page seems to have wandered off.</h1>
  <p>The page you're looking for doesn't exist or may have moved.<br/>Let's get you back to the collection.</p>
  <a href="/">Return Home</a>
</body>
</html>
